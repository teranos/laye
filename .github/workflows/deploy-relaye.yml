name: deploy-relaye

on:
  push:
    branches: ['**']
    paths:
      - 'crates/relaye/**'
      - 'crates/me/**'
      - 'crates/protocol/**'
      - '.github/workflows/deploy-relaye.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-relaye
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  ARTIFACTS_BUCKET: laye-relaye-artifacts
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/relaye-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2

      - name: Build relaye (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl -p relaye

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload binary
        run: |
          aws s3 cp \
            target/x86_64-unknown-linux-musl/release/relaye \
            "s3://${{ env.ARTIFACTS_BUCKET }}/relaye"

      - name: Summarize
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "- Binary uploaded to s3://${{ env.ARTIFACTS_BUCKET }}/relaye"
            echo "- Box will pick up within 30s via relaye-update.timer"
            echo "- Endpoint: https://relaye.sbvh.nl/"
          } >> "$GITHUB_STEP_SUMMARY"
