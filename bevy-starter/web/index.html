<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bevy-starter</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #050608;
        color: #ddd;
        font: 14px ui-monospace, Menlo, monospace;
      }
      #bevy {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
      }
      #overlay {
        position: fixed;
        top: 1em;
        left: 1em;
        right: 1em;
        max-width: 50em;
        z-index: 10;
        pointer-events: none;
      }
      #overlay > * { pointer-events: auto; }
      #status {
        padding: 0.5em 0.8em;
        background: rgba(20, 22, 28, 0.85);
        border: 1px solid #333;
        backdrop-filter: blur(4px);
      }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="overlay">
      <div id="status">booting…</div>
    </div>

    <script type="module">
      const DB = "bevy-starter";
      const STORE = "identity";
      const KEY = "self";

      function openDb() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB, 1);
          req.onupgradeneeded = (ev) => {
            const db = ev.target.result;
            if (!db.objectStoreNames.contains(STORE)) {
              db.createObjectStore(STORE);
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      window.__bevyStarterLoadIdentity = async () => {
        const db = await openDb();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readonly");
          const req = tx.objectStore(STORE).get(KEY);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => reject(req.error);
        });
      };

      window.__bevyStarterSaveIdentity = async (bytes) => {
        const db = await openDb();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readwrite");
          const req = tx.objectStore(STORE).put(bytes, KEY);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      };

      window.__bevyStarterStatus = (msg) => {
        document.getElementById("status").textContent = msg;
      };

      const wasm = await import("./bevy_starter.js");
      await wasm.default({ module_or_path: "./bevy_starter_bg.wasm" });
    </script>
  </body>
</html>
