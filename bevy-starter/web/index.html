<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bevy-starter</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="overlay">
      <div id="status">booting…</div>
      <button id="panic-btn" disabled>trigger rust panic</button>
      <div id="panic"></div>
    </div>
    <div id="bevy-starter-loading">
      <div id="bevy-starter-loading-text">loading bevy-starter</div>
      <progress></progress>
    </div>

    <script type="module">
      const DB = "bevy-starter";
      const STORE = "identity";
      const KEY = "self";

      function openDb() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB, 1);
          req.onupgradeneeded = (ev) => {
            const db = ev.target.result;
            if (!db.objectStoreNames.contains(STORE)) {
              db.createObjectStore(STORE);
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      window.__bevyStarterLoadIdentity = async () => {
        const db = await openDb();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readonly");
          const req = tx.objectStore(STORE).get(KEY);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => reject(req.error);
        });
      };

      window.__bevyStarterSaveIdentity = async (bytes) => {
        const db = await openDb();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(STORE, "readwrite");
          const req = tx.objectStore(STORE).put(bytes, KEY);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      };

      window.__bevyStarterStatus = (msg) => {
        document.getElementById("status").textContent = msg;
      };

      const panicEl = document.getElementById("panic");
      function showPanic(source, detail) {
        panicEl.textContent = `${source}\n\n${detail}`;
        panicEl.classList.add("shown");
      }
      window.__bevyStarterPanic = (envelope) => showPanic("rust panic hook", envelope);
      window.addEventListener("error", (ev) => {
        const detail = ev.error?.stack ?? ev.error?.message ?? ev.message ?? "(no detail)";
        showPanic("window.error", detail);
      });
      window.addEventListener("unhandledrejection", (ev) => {
        const detail = ev.reason?.stack ?? ev.reason?.message ?? String(ev.reason);
        showPanic("unhandledrejection", detail);
      });

      const loadingText = document.getElementById("bevy-starter-loading-text");
      const loadingBar = document.querySelector("#bevy-starter-loading progress");
      function fmtMB(bytes) {
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }
      function updateProgress(loaded, total) {
        if (!loadingText || !loadingBar) return;
        if (total > 0) {
          const pct = Math.floor((loaded / total) * 100);
          loadingBar.value = loaded;
          loadingBar.max = total;
          loadingText.textContent = `loading bevy-starter · ${pct}% · ${fmtMB(loaded)}/${fmtMB(total)}`;
        } else {
          loadingText.textContent = `loading bevy-starter · ${fmtMB(loaded)}`;
        }
      }
      async function streamWasmBytes(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`fetch ${url} → HTTP ${response.status}`);
        const total = parseInt(response.headers.get("content-length") ?? "0", 10);
        const body = response.body;
        if (!body) throw new Error(`fetch ${url} → response.body missing`);
        const reader = body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (value) {
            chunks.push(value);
            loaded += value.length;
            updateProgress(loaded, total);
          }
        }
        const bytes = new Uint8Array(loaded);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.length;
        }
        return bytes;
      }

      const wasm = await import("./bevy_starter.js");
      const wasmBytes = await streamWasmBytes("./bevy_starter_bg.wasm");
      await wasm.default({ module_or_path: wasmBytes });
      document.body.classList.add("loaded");

      const btn = document.getElementById("panic-btn");
      btn.disabled = false;
      btn.onclick = () => {
        try {
          wasm.trigger_panic_demo();
        } catch (e) {
          showPanic("wasm aborted after panic", e?.stack ?? e?.message ?? String(e));
        }
      };
    </script>
  </body>
</html>
